---
name: Rust Coverage

on: # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
  workflow_dispatch:

jobs:
  coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Rust
        run: rustup update stable
      - name: Install Clippy
        run: rustup component add clippy
      - name: Install cargo-llvm-cov
        run: >
          cargo install cargo-llvm-cov
      - name: Install cargo-sonar and run Clippy
        run: |
            cargo install cargo-sonar
            cargo clippy --message-format json > my-clippy-report.json
            cargo sonar --clippy --clippy-path my-clippy-report.json
      - name: Generate code coverage
        run: >
          cargo llvm-cov
          --all-features
          --workspace
          --lcov
          --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            lcov.info
            my-clippy-report.json
            sonar-issues.json

  codecov:
    name: Upload to Codecov
    runs-on: ubuntu-24.04
    needs: coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

        with:
          fetch-depth: 0
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report

      # yamllint disable rule:line-length
      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }} # required
          verbose: true # optional (default = false)
          # yamllint enable rule:line-length

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

        with:
          fetch-depth: 0
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
      # yamllint disable rule:line-length
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.externalIssuesReportPaths=sonar-issues.json
            -Dsonar.rust.clippy.reportPaths=my-clippy-report.json
      # yamllint enable rule:line-length
